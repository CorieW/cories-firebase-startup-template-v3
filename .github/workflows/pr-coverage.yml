# Pull request coverage reporting workflow.

name: PR Coverage Comment

on:
  pull_request:

jobs:
  coverage:
    name: Upload PR Coverage to Codecov
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared workflow environment
        uses: ./.github/actions/setup-workflow-env
        with:
          github-vars-json: ${{ toJSON(vars) }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          better-auth-secret: ${{ secrets.BETTER_AUTH_SECRET }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          autumn-secret-key: ${{ secrets.AUTUMN_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Discover coverage packages and build PR coverage comment body
        id: coverage-metadata
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const coverageRoot = 'coverage';
          const metricNames = ['lines', 'statements', 'functions', 'branches'];
          const coverageDirEntries = fs
            .readdirSync(coverageRoot, { withFileTypes: true })
            .filter((entry) => entry.isDirectory());

          const packageNames = coverageDirEntries
            .map((entry) => entry.name)
            .filter((name) => {
              const packageCoverageDir = path.join(coverageRoot, name);
              const summaryPath = path.join(
                packageCoverageDir,
                'coverage-summary.json'
              );
              const lcovPath = path.join(packageCoverageDir, 'lcov.info');
              return fs.existsSync(summaryPath) && fs.existsSync(lcovPath);
            })
            .sort();

          if (packageNames.length === 0) {
            throw new Error(
              'No package coverage artifacts found under coverage/* with coverage-summary.json and lcov.info'
            );
          }

          const packageSummaries = packageNames.map((name) => {
            const summaryPath = path.join(
              coverageRoot,
              name,
              'coverage-summary.json'
            );
            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8')).total;
            return { name, summary };
          });

          const combined = metricNames.reduce((acc, metric) => {
            const total = packageSummaries.reduce(
              (sum, pkg) => sum + pkg.summary[metric].total,
              0
            );
            const covered = packageSummaries.reduce(
              (sum, pkg) => sum + pkg.summary[metric].covered,
              0
            );
            acc[metric] = { total, covered };
            return acc;
          }, {});

          function formatMetric(metric) {
            const percent =
              metric.total === 0 ? 100 : (metric.covered / metric.total) * 100;
            return `${percent.toFixed(2)}% (${metric.covered}/${metric.total})`;
          }

          function formatRow(scope, summary) {
            return `| ${scope} | ${formatMetric(summary.lines)} | ${formatMetric(summary.statements)} | ${formatMetric(summary.functions)} | ${formatMetric(summary.branches)} |`;
          }

          const rows = [
            '| Scope | Lines | Statements | Functions | Branches |',
            '|---|---:|---:|---:|---:|',
            formatRow('combined', combined),
            ...packageSummaries.map((pkg) => formatRow(pkg.name, pkg.summary)),
          ];

          const body = [
            '## PR Coverage Report',
            '',
            ...rows,
            '',
            '_Generated by `PR Coverage Comment` workflow._',
          ].join('\n');

          const codecovFiles = packageNames
            .map((name) => `./coverage/${name}/lcov.info`)
            .join(',');

          fs.mkdirSync(coverageRoot, { recursive: true });
          fs.writeFileSync(path.join(coverageRoot, 'pr-coverage-comment.md'), body);

          const githubOutputPath = process.env.GITHUB_OUTPUT;
          if (!githubOutputPath) {
            throw new Error('GITHUB_OUTPUT is not available');
          }

          fs.appendFileSync(githubOutputPath, `codecov_files=${codecovFiles}\n`);
          EOF

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.coverage-metadata.outputs.codecov_files }}
          disable_search: true
          fail_ci_if_error: true
          verbose: true

      - name: Post sticky PR coverage comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- pr-coverage-comment -->';
            const body = `${marker}\n${fs.readFileSync('coverage/pr-coverage-comment.md', 'utf8')}`;
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const existing = comments.find((comment) =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
