# Main CI workflow.

name: CI

on:
  push:

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared workflow environment
        uses: ./.github/actions/setup-workflow-env
        with:
          github-vars-json: ${{ toJSON(vars) }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          better-auth-secret: ${{ secrets.BETTER_AUTH_SECRET }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          autumn-secret-key: ${{ secrets.AUTUMN_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

  lint:
    name: Linter Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared workflow environment
        uses: ./.github/actions/setup-workflow-env
        with:
          github-vars-json: ${{ toJSON(vars) }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          better-auth-secret: ${{ secrets.BETTER_AUTH_SECRET }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          autumn-secret-key: ${{ secrets.AUTUMN_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared workflow environment
        uses: ./.github/actions/setup-workflow-env
        with:
          github-vars-json: ${{ toJSON(vars) }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          better-auth-secret: ${{ secrets.BETTER_AUTH_SECRET }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          autumn-secret-key: ${{ secrets.AUTUMN_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared workflow environment
        uses: ./.github/actions/setup-workflow-env
        with:
          github-vars-json: ${{ toJSON(vars) }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          better-auth-secret: ${{ secrets.BETTER_AUTH_SECRET }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          autumn-secret-key: ${{ secrets.AUTUMN_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared workflow environment
        uses: ./.github/actions/setup-workflow-env
        with:
          github-vars-json: ${{ toJSON(vars) }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          better-auth-secret: ${{ secrets.BETTER_AUTH_SECRET }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          autumn-secret-key: ${{ secrets.AUTUMN_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # Required for running emulator-backed integration tests
      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run unit tests
        run: pnpm run test

      - name: Run integration tests (emulator-backed)
        env:
          RUN_BACK_INTEGRATION_TESTS: 'true'
        run: pnpm dlx firebase-tools emulators:exec --project demo-startup-template --only firestore,functions "pnpm run test:integration"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [build, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared workflow environment
        uses: ./.github/actions/setup-workflow-env
        with:
          github-vars-json: ${{ toJSON(vars) }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          better-auth-secret: ${{ secrets.BETTER_AUTH_SECRET }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          autumn-secret-key: ${{ secrets.AUTUMN_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run coverage
        run: pnpm run test:coverage
