# PR smoke E2E workflow.

name: E2E Smoke PR

on:
  pull_request:

jobs:
  emulator-gate:
    name: Emulator Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared workflow environment
        uses: ./.github/actions/setup-workflow-env
        with:
          github-vars-json: ${{ toJSON(vars) }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          better-auth-secret: ${{ secrets.BETTER_AUTH_SECRET }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          autumn-secret-key: ${{ secrets.AUTUMN_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run emulator-backed integration tests
        env:
          RUN_BACK_INTEGRATION_TESTS: 'true'
        run: pnpm dlx firebase-tools emulators:exec --project demo-startup-template --only firestore,functions "pnpm run test:integration"

  prod-build-smoke:
    name: Production Build Smoke
    runs-on: ubuntu-latest
    needs: [emulator-gate]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared workflow environment
        uses: ./.github/actions/setup-workflow-env
        with:
          github-vars-json: ${{ toJSON(vars) }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          better-auth-secret: ${{ secrets.BETTER_AUTH_SECRET }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          autumn-secret-key: ${{ secrets.AUTUMN_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @cories-firebase-startup-template-v3/dashboard exec playwright install --with-deps chromium firefox webkit msedge

      - name: Build
        run: pnpm run build

      - name: Run E2E smoke tests
        run: pnpm run test:e2e:smoke

      - name: Run production build smoke checks (dashboard server)
        shell: bash
        run: |
          PORT=4173 HOST=127.0.0.1 pnpm --filter @cories-firebase-startup-template-v3/dashboard start > /tmp/dashboard-preview.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ > /dev/null; then
              break
            fi
            sleep 1
          done

          BASE_URL=http://127.0.0.1:4173 pnpm run test:prod-smoke:dashboard
