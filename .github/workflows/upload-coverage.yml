# Coverage upload workflow.

name: Upload Coverage

on:
  push:

jobs:
  upload-coverage:
    name: Upload Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Load shared workflow environment
        uses: ./.github/actions/setup-workflow-env
        with:
          github-vars-json: ${{ toJSON(vars) }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          better-auth-secret: ${{ secrets.BETTER_AUTH_SECRET }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          autumn-secret-key: ${{ secrets.AUTUMN_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Discover coverage packages
        id: coverage-metadata
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const coverageRoot = 'coverage';
          const coverageDirEntries = fs
            .readdirSync(coverageRoot, { withFileTypes: true })
            .filter((entry) => entry.isDirectory());

          const packageNames = coverageDirEntries
            .map((entry) => entry.name)
            .filter((name) => {
              const lcovPath = path.join(coverageRoot, name, 'lcov.info');
              return fs.existsSync(lcovPath);
            })
            .sort();

          if (packageNames.length === 0) {
            throw new Error('No lcov.info files found under coverage/*');
          }

          const codecovFiles = packageNames
            .map((name) => `./coverage/${name}/lcov.info`)
            .join(',');

          const githubOutputPath = process.env.GITHUB_OUTPUT;
          if (!githubOutputPath) {
            throw new Error('GITHUB_OUTPUT is not available');
          }

          fs.appendFileSync(githubOutputPath, `codecov_files=${codecovFiles}\n`);
          EOF

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.coverage-metadata.outputs.codecov_files }}
          disable_search: true
          fail_ci_if_error: true
          verbose: true
