# Firebase App Hosting config for the docs server deployment.

runConfig:
  minInstances: 0
  maxInstances: 3
  concurrency: 80

scripts:
  buildCommand: pnpm build
  runCommand: pnpm start

outputFiles:
  serverApp:
    include:
      - .output

# Configure environment variables and secrets here if your docs package
# eventually needs runtime integrations.
