# Firebase App Hosting config for the admin server deployment.

runConfig:
  minInstances: 0
  maxInstances: 5
  concurrency: 80

scripts:
  buildCommand: pnpm build
  runCommand: pnpm start

outputFiles:
  serverApp:
    include:
      - .output

